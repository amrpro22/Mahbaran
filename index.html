
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>صندوق مساعدة الحالات الطارئة</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['SF Pro Text', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Cairo', 'sans-serif'],
                    },
                    colors: {
                        primary: '#001f54',
                        secondary: '#003b8e',
                        gold: '#c89b3c',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #f9fafb;
            -webkit-font-smoothing: antialiased;
            letter-spacing: -0.01em;
            overscroll-behavior-y: contain;
        }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .sticky-alert { position: sticky; top: 0; z-index: 100; }
        h1 { font-size: 1.5rem !important; }
        .stat-value { font-size: 1.4rem !important; }
        .stat-label { font-size: 0.65rem !important; letter-spacing: 0.02em; }
        #searchInput { font-size: 16px !important; touch-action: manipulation; }
        .progress-bar { height: 4px; border-radius: 2px; background: #e2e8f0; overflow: hidden; }
        .progress-fill { height: 100%; transition: width 0.5s ease-in-out; }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center">

    <!-- Emergency Alert Bar -->
    <div class="sticky-alert w-full bg-red-600/95 text-white py-1.5 px-4 shadow-sm text-center">
        <p class="text-[10px] md:text-xs font-light tracking-wide flex items-center justify-center gap-1.5">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 opacity-80" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
            الرجاء الدفع قبل تاريخ 2026/6/1 تجنباً للإحراج
        </p>
    </div>

    <div class="w-full max-w-2xl bg-white rounded-[1.5rem] shadow-sm border border-slate-200 overflow-hidden flex flex-col my-4 md:my-8 mx-4">
        
        <!-- App Header -->
        <header class="bg-primary text-white py-6 px-6 text-center relative">
            <div class="relative z-10">
                <h1 class="font-bold tracking-tight mb-0.5 text-white">صندوق مساعدة الحالات الطارئة</h1>
                <p class="text-slate-400 text-[10px] font-medium uppercase tracking-[0.2em]">قرية محبران</p>
            </div>
            <div class="absolute bottom-0 left-0 w-full h-[2px] bg-gold opacity-60"></div>
        </header>

        <!-- Statistics -->
        <div class="grid grid-cols-3 gap-2 px-4 -mt-4 relative z-20">
            <div class="bg-white p-3 rounded-xl shadow-sm border border-slate-100 flex flex-col items-center">
                <span class="stat-label text-slate-400 font-bold mb-0.5">إجمالي المشتركين</span>
                <span id="statTotal" class="stat-value font-black text-primary">0</span>
            </div>
            <div class="bg-white p-3 rounded-xl shadow-sm border border-slate-100 flex flex-col items-center">
                <span class="stat-label text-emerald-500 font-bold mb-0.5">المسددين</span>
                <span id="statPaid" class="stat-value font-black text-emerald-600">0</span>
            </div>
            <div class="bg-white p-3 rounded-xl shadow-sm border border-slate-100 flex flex-col items-center">
                <span class="stat-label text-rose-400 font-bold mb-0.5">الانتظار</span>
                <span id="statPending" class="stat-value font-black text-rose-600">0</span>
            </div>
        </div>

        <main class="p-6">
            <div class="mb-6">
                <div class="flex gap-2">
                    <div class="relative flex-grow">
                        <input 
                            type="text" 
                            id="searchInput" 
                            inputmode="text"
                            class="w-full pr-4 pl-4 py-3 bg-slate-50 rounded-xl border border-slate-200 focus:border-primary focus:ring-0 transition-all outline-none placeholder:text-slate-400 text-sm"
                            placeholder="اكتب الاسم الكامل للبحث..."
                        >
                    </div>
                    <button 
                        onclick="window.searchDonor()" 
                        class="bg-primary text-white text-[11px] font-bold py-3 px-6 rounded-xl hover:bg-slate-800 transition-colors">
                        بـحث
                    </button>
                </div>
            </div>

            <div id="resultsContainer" class="min-h-[160px] flex items-center justify-center border border-dashed border-slate-200 rounded-2xl bg-slate-50/50">
                <p id="initialMsg" class="text-[10px] font-medium text-slate-400">ستظهر النتائج هنا..</p>
                <div id="loadingIndicator" class="hidden animate-pulse text-[10px] text-primary font-bold">جاري تحديث البيانات...</div>
            </div>
        </main>

        <footer class="bg-white border-t border-slate-100 p-6">
            <div class="flex flex-col gap-4">
                <div class="flex flex-wrap justify-center gap-6 md:justify-between items-start text-center md:text-right">
                    <div class="flex flex-col items-center md:items-start">
                        <p class="text-[8px] text-slate-400 font-bold uppercase tracking-wider mb-1">إشراف</p>
                        <p class="text-[11px] font-bold text-primary border-b-2 border-gold/40 pb-0.5">مصطفى الشجاع</p>
                    </div>
                    <div class="flex flex-col items-center md:items-start">
                        <p class="text-[8px] text-slate-400 font-bold uppercase tracking-wider mb-1">تدقيق مالي</p>
                        <p class="text-[11px] font-bold text-primary">ياسر الشجاع</p>
                    </div>
                    <div class="flex flex-col items-center md:items-start">
                        <p class="text-[8px] text-slate-400 font-bold uppercase tracking-wider mb-1">تطوير</p>
                        <p class="text-[11px] font-bold text-primary">عمرو مسعد الشجاع</p>
                    </div>
                </div>
                <div class="text-center pt-2">
                    <p class="text-[9px] text-primary/40 font-serif italic">"وما تقدموا لأنفسكم من خير تجدوه عند الله"</p>
                </div>
            </div>
        </footer>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, collection, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBupAOs6diz9ET8lGnMdyKjS_cMS8sA2Uc",
            authDomain: "amr4admin.firebaseapp.com",
            projectId: "amr4admin",
            storageBucket: "amr4admin.firebasestorage.app",
            messagingSenderId: "177280788092",
            appId: "1:177280788092:web:44f16c8f585a5b3e484bf9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "amr4admin";
        
        const donorsCol = collection(db, 'artifacts', appId, 'public', 'data', 'donors');

        let donorsData = [];

        const parseDonorInfo = (d) => {
            const note = d.note || "";
            const totalMatch = note.match(/T:(\d+(\.\d+)?)/);
            const paidMatch = note.match(/P:(\d+(\.\d+)?)/);
            const durationMatch = note.match(/D:([a-z0-9]+)/);
            
            const total = totalMatch ? parseFloat(totalMatch[1]) : 0;
            const paid = paidMatch ? parseFloat(paidMatch[1]) : 0;
            const durationKey = durationMatch ? durationMatch[1] : 'none';

            let curr = 'sar';
            if (note.toUpperCase().includes('C:USD')) curr = 'usd';
            else if (note.toUpperCase().includes('C:YER')) curr = 'yer';

            const remaining = Math.max(0, total - paid);
            const progress = total > 0 ? Math.min(100, (paid / total) * 100) : 0;
            const isFull = total > 0 && paid >= total;
            
            const durationLabels = { '3m': '٣ أشهر', '6m': '٦ أشهر', '1y': 'سنة', 'none': '' };

            let statusMessage = '';
            let statusColorClass = 'text-amber-600';
            let isConsideredPaid = false;

            if (isFull || durationKey === '1y') {
                statusMessage = 'تم الدفع بالكامل ✓ نشكر عطاءكم';
                statusColorClass = 'text-emerald-600';
                isConsideredPaid = true;
            } else if (durationKey === '3m') {
                statusMessage = 'يتم استكمال السداد بتاريخ 2026/9/1';
                isConsideredPaid = true; // نعتبره مسدد حالياً لأنه مشترك بنظام دفع مجدول
            } else if (durationKey === '6m') {
                statusMessage = 'يتم استكمال السداد بتاريخ 2026/12/1';
                isConsideredPaid = true; // نعتبره مسدد حالياً
            } else {
                statusMessage = 'جاري استكمال السداد.. الموعد النهائي 2026/6/1';
                statusColorClass = 'text-rose-500';
                isConsideredPaid = false;
            }

            return { 
                total, paid, remaining, curr, progress, isFull, isConsideredPaid,
                duration: durationLabels[durationKey] || '',
                durationKey,
                statusMessage,
                statusColorClass
            };
        };

        window.searchDonor = () => {
            const term = document.getElementById("searchInput").value.trim().toLowerCase();
            const container = document.getElementById("resultsContainer");
            
            if (!term) {
                container.innerHTML = `<p class="text-[10px] font-medium text-slate-400">يرجى كتابة الاسم للبحث..</p>`;
                return;
            }

            const matches = donorsData.filter(d => d.name.trim().toLowerCase() === term);

            if (matches.length > 0) {
                let html = '<div class="fade-in w-full p-4 flex flex-col gap-6">';
                matches.forEach(m => {
                    const info = parseDonorInfo(m);
                    html += `
                        <div class="bg-white rounded-2xl p-4 border border-slate-100 shadow-sm text-center">
                            <div class="flex justify-between items-center mb-2">
                                <span class="text-[10px] font-bold text-slate-400 bg-slate-50 px-2 py-1 rounded-md">${info.duration || 'دائم'}</span>
                                <h4 class="font-bold text-primary text-sm">${m.name}</h4>
                                <span class="text-[10px] font-bold text-primary uppercase">${info.curr}</span>
                            </div>

                            <div class="flex justify-between text-[11px] mb-3 px-2">
                                <div class="flex flex-col">
                                    <span class="text-slate-400 text-[9px]">المدفوع</span>
                                    <span class="font-bold text-emerald-600">${info.paid.toLocaleString()}</span>
                                </div>
                                <div class="flex flex-col">
                                    <span class="text-slate-400 text-[9px]">المتبقي</span>
                                    <span class="font-bold text-rose-500">${info.remaining.toLocaleString()}</span>
                                </div>
                            </div>

                            <div class="progress-bar mb-3">
                                <div class="progress-fill ${info.isFull ? 'bg-emerald-500' : 'bg-primary'}" style="width: ${info.progress}%"></div>
                            </div>

                            <p class="text-[10px] font-bold ${info.statusColorClass}">
                                ${info.statusMessage}
                            </p>
                        </div>
                    `;
                });
                html += '</div>';
                container.innerHTML = html;
            } else {
                container.innerHTML = `<p class="text-xs text-slate-400 text-center px-4">عذراً، لم يتم العثور على نتيجة مطابقة لهذا الاسم تماماً</p>`;
            }
        };

        const updateStats = () => {
            let totalCount = donorsData.length;
            let paidCount = 0;
            let pendingCount = 0;

            donorsData.forEach(d => {
                const info = parseDonorInfo(d);
                if (info.isConsideredPaid) {
                    paidCount++;
                } else {
                    pendingCount++;
                }
            });
            
            document.getElementById('statTotal').innerText = totalCount;
            document.getElementById('statPaid').innerText = paidCount;
            document.getElementById('statPending').innerText = pendingCount;
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loadingIndicator').classList.remove('hidden');
                document.getElementById('initialMsg').classList.add('hidden');

                onSnapshot(donorsCol, (snap) => {
                    donorsData = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    updateStats();
                    document.getElementById('loadingIndicator').classList.add('hidden');
                    document.getElementById('initialMsg').classList.remove('hidden');
                });
            } else {
                signInAnonymously(auth);
            }
        });

        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') window.searchDonor();
        });
    </script>
</body>
</html>
