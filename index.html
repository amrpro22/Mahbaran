
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>صندوق مساعدة الحالات الطارئة</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
        
        body {
            background-color: #f8fafc;
            font-family: 'Cairo', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .app-card {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            background: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .header-gradient {
            background: linear-gradient(135deg, #001f54 0%, #003b8e 100%);
            padding: 50px 20px 40px;
            text-align: center;
            color: white;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
        }
        .search-container {
            margin-top: -35px;
            padding: 0 20px;
        }
        .search-input {
            width: 100%;
            padding: 16px 24px;
            border-radius: 20px;
            border: 1px solid #f1f5f9;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            outline: none;
            font-size: 16px;
        }
        .result-item {
            background: #fff;
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 16px;
            border: 1px solid #f1f5f9;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid #e2e8f0;
            border-top-color: #001f54;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex justify-center">

    <div class="app-card">
        <!-- شريط التنبيه العلوي -->
        <div class="bg-red-600 text-white text-[11px] py-2 text-center font-bold">
             ⚠️ يرجى تسديد الاشتراكات قبل تاريخ 2026/06/01
        </div>

        <!-- الهيدر -->
        <div class="header-gradient">
            <h1 class="text-2xl font-black mb-1">صندوق الحالات الطارئة</h1>
            <p class="text-blue-200 text-[11px] font-semibold tracking-widest uppercase">قرية محبران - اليمن</p>
        </div>

        <!-- منطقة البحث -->
        <div class="search-container">
            <div class="relative group">
                <input type="text" id="searchInput" class="search-input" placeholder="اكتب الاسم الكامل للبحث..." autocomplete="off">
                <button onclick="searchDonor()" class="absolute left-2 top-2 bottom-2 bg-[#001f54] text-white px-6 rounded-2xl text-[11px] font-bold active:scale-95 transition-all">
                    بـحـث
                </button>
            </div>
        </div>

        <!-- الإحصائيات -->
        <div class="grid grid-cols-3 gap-3 p-5 mt-4">
            <div class="bg-slate-50 p-4 rounded-3xl text-center border border-slate-100 shadow-sm">
                <p class="text-[9px] text-slate-400 font-bold mb-1">المشتركين</p>
                <p id="statTotal" class="text-xl font-black text-[#001f54]">0</p>
            </div>
            <div class="bg-emerald-50 p-4 rounded-3xl text-center border border-emerald-100 shadow-sm">
                <p class="text-[9px] text-emerald-500 font-bold mb-1">المسددين</p>
                <p id="statPaid" class="text-xl font-black text-emerald-600">0</p>
            </div>
            <div class="bg-rose-50 p-4 rounded-3xl text-center border border-rose-100 shadow-sm">
                <p class="text-[9px] text-rose-400 font-bold mb-1 uppercase text-xs">الانتظار</p>
                <p id="statPending" class="text-xl font-black text-rose-600">0</p>
            </div>
        </div>

        <!-- منطقة عرض المحتوى -->
        <div class="px-5 flex-grow pb-10">
            <div id="loadingStatus" class="text-center py-10">
                <div class="spinner"></div>
                <p id="loadingMsg" class="text-[10px] text-slate-400 mt-3 font-semibold">جاري جلب البيانات من السيرفر...</p>
            </div>

            <div id="resultsWrapper" class="mt-4">
                <div class="text-center py-16 opacity-20">
                    <p class="text-sm font-bold">ابحث بالاسم لعرض الحالة المالية</p>
                </div>
            </div>
        </div>

        <!-- الفوتر -->
        <footer class="bg-slate-50 border-t border-slate-100 px-6 py-8">
            <div class="grid grid-cols-1 gap-6 text-center">
                <div class="flex flex-col items-center">
                    <span class="text-[9px] text-slate-400 font-bold mb-1 tracking-widest uppercase">تصميم وتطوير</span>
                    <h3 class="text-sm font-bold text-[#001f54]">عمرو مسعد الشجاع</h3>
                </div>
                
                <div class="grid grid-cols-2 gap-4 pt-4 border-t border-slate-200">
                    <div class="flex flex-col items-center border-l border-slate-200">
                        <span class="text-[9px] text-slate-400 font-bold mb-1 uppercase">إشراف</span>
                        <h3 class="text-[11px] font-bold text-slate-700">مصطفى الشجاع</h3>
                    </div>
                    <div class="flex flex-col items-center">
                        <span class="text-[9px] text-slate-400 font-bold mb-1 uppercase">تدقيق مالي</span>
                        <h3 class="text-[11px] font-bold text-slate-700">ياسر الشجاع</h3>
                    </div>
                </div>
                <p id="connectionType" class="text-[8px] text-slate-300 mt-4 uppercase tracking-tighter">الحالة: غير متصل</p>
            </div>
        </footer>
    </div>

    <script>
        // إعدادات Supabase
        const SUPABASE_URL = "https://cdtzvslfiokmzissqnfgi.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNkdHp2c2xmaW9rbXppc3FuZmdpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1OTEzODMsImV4cCI6MjA5NDE2NzM4M30.l05IAIvC-Nyk4r0RlL_eF6HJER_ZmuGEravSInevCPs";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // ⚠️ بيانات احتياطية تظهر في حال فشل الاتصال بالسيرفر
        const FALLBACK_DATA = [
            { name: "عمرو مسعد الشجاع", note: "T:1000 P:1000 D:1y" },
            { name: "مصطفى الشجاع", note: "T:500 P:250 D:3m" },
            { name: "ياسر الشجاع", note: "T:1000 P:1000 D:none" }
        ];

        let donors = [];

        // محاولة جلب الكاش أولاً لسرعة الاستجابة
        const localData = localStorage.getItem('donors_backup');
        if(localData) {
            donors = JSON.parse(localData);
            updateStats();
        }

        function getInfo(d) {
            const n = d.note || "";
            const t = parseFloat((n.match(/T:(\d+(\.\d+)?)/) || [0, 0])[1]);
            const p = parseFloat((n.match(/P:(\d+(\.\d+)?)/) || [0, 0])[1]);
            const dK = (n.match(/D:([a-z0-9]+)/) || [0, 'none'])[1];
            
            let c = 'SAR';
            if (n.toUpperCase().includes('C:USD')) c = 'USD';
            else if (n.toUpperCase().includes('C:YER')) c = 'YER';

            const r = Math.max(0, t - p);
            const pr = t > 0 ? Math.min(100, (p / t) * 100) : 0;
            const isFull = t > 0 && p >= t;
            const labels = { '3m': '٣ أشهر', '6m': '٦ أشهر', '1y': 'سنة', 'none': 'دائم' };
            
            let msg = 'بانتظار استكمال السداد..';
            let cls = 'text-rose-500';
            let paid = (isFull || dK === '1y' || dK === '3m' || dK === '6m');

            if (isFull || dK === '1y') {
                msg = 'تم الدفع بالكامل ✓';
                cls = 'text-emerald-600';
            } else if (dK === '3m' || dK === '6m') {
                msg = 'مجدول (تم الاعتماد)';
                cls = 'text-blue-500';
            }

            return { t, p, r, c, pr, msg, cls, paid, dur: labels[dK] };
        }

        function updateStats() {
            let pCnt = 0;
            donors.forEach(d => { if(getInfo(d).paid) pCnt++; });
            document.getElementById('statTotal').innerText = donors.length;
            document.getElementById('statPaid').innerText = pCnt;
            document.getElementById('statPending').innerText = donors.length - pCnt;
        }

        window.searchDonor = function() {
            const term = document.getElementById("searchInput").value.trim().toLowerCase();
            const wrapper = document.getElementById("resultsWrapper");
            if (!term) return;

            const filtered = donors.filter(d => (d.name || "").toLowerCase().includes(term));

            if (filtered.length > 0) {
                let html = '<div class="space-y-4">';
                filtered.forEach(m => {
                    const i = getInfo(m);
                    html += `
                        <div class="result-item shadow-sm border border-slate-50">
                            <div class="flex justify-between items-center mb-5">
                                <span class="bg-blue-50 text-[#001f54] text-[9px] px-3 py-1 rounded-full font-bold border border-blue-100">${i.dur}</span>
                                <h3 class="font-bold text-gray-800 text-sm text-right">${m.name}</h3>
                            </div>
                            <div class="grid grid-cols-2 gap-4 mb-5">
                                <div class="text-right">
                                    <p class="text-[9px] text-slate-400 font-bold mb-1 uppercase">المدفوع (${i.c})</p>
                                    <p class="text-lg font-black text-emerald-600">${i.p.toLocaleString()}</p>
                                </div>
                                <div class="text-left">
                                    <p class="text-[9px] text-slate-400 font-bold mb-1 uppercase">المتبقي</p>
                                    <p class="text-lg font-black text-rose-500">${i.r.toLocaleString()}</p>
                                </div>
                            </div>
                            <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden mb-4">
                                <div class="h-full ${i.paid ? 'bg-emerald-500' : 'bg-[#001f54]'}" style="width:${i.pr}%"></div>
                            </div>
                            <p class="text-xs font-bold ${i.cls} text-center">${i.msg}</p>
                        </div>`;
                });
                wrapper.innerHTML = html + '</div>';
            } else {
                wrapper.innerHTML = `<div class="text-center py-12 text-slate-400 font-bold">لم يتم العثور على أي نتائج</div>`;
            }
        };

        async function loadDonors() {
            const loadingMsg = document.getElementById('loadingMsg');
            const connType = document.getElementById('connectionType');

            try {
                // محاولة الاتصال بـ Supabase مع مهلة زمنية 8 ثواني
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 8000);

                const { data, error } = await supabaseClient
                    .from('donors')
                    .select('*')
                    .abortSignal(controller.signal);

                clearTimeout(timeoutId);

                if(error) throw error;

                if (data && data.length > 0) {
                    donors = data;
                    localStorage.setItem('donors_backup', JSON.stringify(donors));
                    connType.innerText = "الحالة: متصل بالسيرفر";
                    connType.className = "text-[8px] text-emerald-500 mt-4 uppercase tracking-tighter";
                } else {
                    throw new Error("Empty data");
                }
            } catch (err) {
                console.error("Connection Error:", err);
                
                // إذا فشل الاتصال ولم يكن هناك كاش سابق، استخدم البيانات الاحتياطية المدمجة
                if (donors.length === 0) {
                    donors = FALLBACK_DATA;
                }
                
                connType.innerText = "الحالة: وضع عدم الاتصال (بيانات مدمجة)";
                connType.className = "text-[8px] text-orange-400 mt-4 uppercase tracking-tighter";
            } finally {
                updateStats();
                document.getElementById('loadingStatus').classList.add('hidden');
            }
        }

        // بدء تحميل البيانات
        loadDonors();

        // تفعيل البحث بضغط زر الإدخال
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchDonor();
        });
    </script>
</body>
</html>
