
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>صندوق مساعدة الحالات الطارئة</title>
    
    <!-- تحميل مكتبة التنسيق -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- تحميل مكتبات Firebase بالنمط التقليدي (Compatibility Version) لضمان العمل على كل الهواتف -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Segoe UI', 'Roboto', 'Cairo', 'sans-serif'],
                    },
                    colors: {
                        primary: '#001f54',
                        gold: '#c89b3c',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #f9fafb;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .sticky-alert { position: sticky; top: 0; z-index: 100; }
        #searchInput { font-size: 16px !important; border: 1px solid #e2e8f0; }
        .progress-bar { height: 6px; border-radius: 3px; background: #f1f5f9; overflow: hidden; }
        .progress-fill { height: 100%; transition: width 0.8s ease-in-out; }
    </style>
</head>

<body class="flex flex-col items-center">

    <!-- شريط التنبيه العلوي -->
    <div class="sticky-alert w-full bg-red-600 text-white py-2 px-4 shadow-md text-center text-xs font-bold">
        الرجاء الدفع قبل تاريخ 2026/6/1 تجنباً للإحراج
    </div>

    <div class="w-full max-w-md bg-white shadow-xl flex flex-col min-h-screen md:min-h-0 md:my-8 md:rounded-3xl overflow-hidden border border-slate-100">
        
        <!-- الرأس -->
        <header class="bg-primary text-white py-8 px-6 text-center">
            <h1 class="font-bold text-xl mb-1">صندوق مساعدة الحالات الطارئة</h1>
            <p class="text-slate-400 text-[10px] tracking-[0.2em] uppercase">قرية محبران</p>
        </header>

        <!-- الإحصائيات -->
        <div class="grid grid-cols-3 gap-2 px-4 -mt-6">
            <div class="bg-white p-3 rounded-2xl shadow-lg border border-slate-50 flex flex-col items-center">
                <span class="text-[9px] text-slate-400 font-bold mb-1">المشتركين</span>
                <span id="statTotal" class="text-lg font-black text-primary">0</span>
            </div>
            <div class="bg-white p-3 rounded-2xl shadow-lg border border-slate-50 flex flex-col items-center">
                <span class="text-[9px] text-emerald-500 font-bold mb-1">المسددين</span>
                <span id="statPaid" class="text-lg font-black text-emerald-600">0</span>
            </div>
            <div class="bg-white p-3 rounded-2xl shadow-lg border border-slate-50 flex flex-col items-center">
                <span class="text-[9px] text-rose-400 font-bold mb-1">الانتظار</span>
                <span id="statPending" class="text-lg font-black text-rose-600">0</span>
            </div>
        </div>

        <main class="p-6 flex-grow">
            <!-- حقل البحث -->
            <div class="flex gap-2 mb-8">
                <input 
                    type="text" 
                    id="searchInput" 
                    class="flex-grow pr-4 py-4 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-primary/20 transition-all text-sm"
                    placeholder="اكتب الاسم الكامل هنا..."
                    autocomplete="off"
                >
                <button 
                    onclick="searchDonor()" 
                    class="bg-primary text-white px-6 rounded-2xl font-bold text-sm active:scale-95 transition-transform">
                    بحث
                </button>
            </div>

            <!-- منطقة النتائج -->
            <div id="resultsContainer" class="min-h-[200px] flex flex-col items-center justify-center border-2 border-dashed border-slate-100 rounded-3xl bg-slate-50/30">
                <div id="loadingIndicator" class="hidden flex flex-col items-center">
                    <div class="w-8 h-8 border-4 border-primary border-t-transparent rounded-full animate-spin mb-2"></div>
                    <p class="text-[10px] text-primary font-bold">جاري تحميل البيانات...</p>
                </div>
                <p id="initialMsg" class="text-xs text-slate-400">النتائج ستظهر هنا عند البحث</p>
            </div>
        </main>

        <footer class="p-6 bg-slate-50/50 border-t border-slate-100">
            <div class="grid grid-cols-3 gap-2 text-center">
                <div>
                    <p class="text-[8px] text-slate-400 font-bold mb-1">إشراف</p>
                    <p class="text-[10px] font-bold text-primary">مصطفى الشجاع</p>
                </div>
                <div>
                    <p class="text-[8px] text-slate-400 font-bold mb-1">تدقيق</p>
                    <p class="text-[10px] font-bold text-primary">ياسر الشجاع</p>
                </div>
                <div>
                    <p class="text-[8px] text-slate-400 font-bold mb-1">تطوير</p>
                    <p class="text-[10px] font-bold text-primary">عمرو الشجاع</p>
                </div>
            </div>
        </footer>
    </div>

    <script>
        // إعدادات Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBupAOs6diz9ET8lGnMdyKjS_cMS8sA2Uc",
            authDomain: "amr4admin.firebaseapp.com",
            projectId: "amr4admin",
            storageBucket: "amr4admin.firebasestorage.app",
            messagingSenderId: "177280788092",
            appId: "1:177280788092:web:44f16c8f585a5b3e484bf9"
        };

        // تهيئة التطبيق بالنمط التقليدي المتوافق مع كل الجوالات
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const appId = "amr4admin";

        let donorsData = [];

        function parseDonorInfo(d) {
            const note = d.note || "";
            const total = parseFloat((note.match(/T:(\d+(\.\d+)?)/) || [0, 0])[1]);
            const paid = parseFloat((note.match(/P:(\d+(\.\d+)?)/) || [0, 0])[1]);
            const durationKey = (note.match(/D:([a-z0-9]+)/) || [0, 'none'])[1];
            
            let curr = 'sar';
            if (note.toUpperCase().includes('C:USD')) curr = 'usd';
            else if (note.toUpperCase().includes('C:YER')) curr = 'yer';

            const remaining = Math.max(0, total - paid);
            const progress = total > 0 ? Math.min(100, (paid / total) * 100) : 0;
            const isFull = total > 0 && paid >= total;
            
            const durationLabels = { '3m': '٣ أشهر', '6m': '٦ أشهر', '1y': 'سنة', 'none': 'دائم' };
            let statusMessage = '';
            let color = 'text-amber-600';
            let isConsideredPaid = false;

            if (isFull || durationKey === '1y') {
                statusMessage = 'تم الدفع بنجاح ✓ نشكركم';
                color = 'text-emerald-600';
                isConsideredPaid = true;
            } else if (durationKey === '3m') {
                statusMessage = 'يتم استكمال السداد بتاريخ 2026/9/1';
                isConsideredPaid = true;
            } else if (durationKey === '6m') {
                statusMessage = 'يتم استكمال السداد بتاريخ 2026/12/1';
                isConsideredPaid = true;
            } else {
                statusMessage = 'الموعد النهائي للسداد 2026/6/1';
                color = 'text-rose-500';
            }

            return { total, paid, remaining, curr, progress, statusMessage, color, isConsideredPaid, duration: durationLabels[durationKey] };
        }

        window.searchDonor = function() {
            const term = document.getElementById("searchInput").value.trim().toLowerCase();
            const container = document.getElementById("resultsContainer");
            
            if (!term) return;

            const matches = donorsData.filter(d => (d.name || "").trim().toLowerCase() === term);

            if (matches.length > 0) {
                let html = '<div class="fade-in w-full p-4 space-y-4">';
                matches.forEach(m => {
                    const info = parseDonorInfo(m);
                    html += `
                        <div class="bg-white rounded-3xl p-5 border border-slate-100 shadow-sm text-center">
                            <div class="flex justify-between items-center mb-4">
                                <span class="text-[9px] font-bold bg-primary/5 text-primary px-3 py-1 rounded-full">${info.duration}</span>
                                <h4 class="font-bold text-primary text-sm">${m.name}</h4>
                                <span class="text-[9px] font-bold text-slate-300 uppercase">${info.curr}</span>
                            </div>
                            <div class="flex justify-between mb-4 px-2">
                                <div class="text-right">
                                    <p class="text-slate-400 text-[9px] mb-1">المدفوع</p>
                                    <p class="font-black text-emerald-600 text-sm">${info.paid.toLocaleString()}</p>
                                </div>
                                <div class="text-left">
                                    <p class="text-slate-400 text-[9px] mb-1">المتبقي</p>
                                    <p class="font-black text-rose-500 text-sm">${info.remaining.toLocaleString()}</p>
                                </div>
                            </div>
                            <div class="progress-bar mb-4">
                                <div class="progress-fill ${info.paid >= info.total ? 'bg-emerald-500' : 'bg-primary'}" style="width: ${info.progress}%"></div>
                            </div>
                            <p class="text-[10px] font-bold ${info.color}">${info.statusMessage}</p>
                        </div>`;
                });
                html += '</div>';
                container.innerHTML = html;
            } else {
                container.innerHTML = `<p class="text-xs text-slate-400">لم يتم العثور على اسم مطابق تماماً</p>`;
            }
        };

        // الدخول التلقائي وجلب البيانات
        auth.signInAnonymously().then(() => {
            document.getElementById('loadingIndicator').classList.remove('hidden');
            document.getElementById('initialMsg').classList.add('hidden');

            db.collection('artifacts').doc(appId).collection('public').doc('data').collection('donors')
            .onSnapshot((snap) => {
                donorsData = snap.docs.map(doc => doc.data());
                
                let paid = 0;
                donorsData.forEach(d => { if(parseDonorInfo(d).isConsideredPaid) paid++; });
                
                document.getElementById('statTotal').innerText = donorsData.length;
                document.getElementById('statPaid').innerText = paid;
                document.getElementById('statPending').innerText = donorsData.length - paid;
                
                document.getElementById('loadingIndicator').classList.add('hidden');
                document.getElementById('initialMsg').classList.remove('hidden');
            }, (err) => {
                console.error("Firestore Error:", err);
                document.getElementById('initialMsg').innerText = "خطأ في الاتصال بالقاعدة";
            });
        }).catch(err => {
            console.error("Auth Error:", err);
            document.getElementById('initialMsg').innerText = "خطأ في تسجيل الدخول";
        });

        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchDonor();
        });
    </script>
</body>
</html>
```
