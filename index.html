
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>صندوق مساعدة الحالات الطارئة</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- استخدام نسخ Firebase المتوافقة مع المتصفحات القديمة والإنترنت الضعيف -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
        
        body {
            background-color: #f8fafc;
            font-family: 'Cairo', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .app-card {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            background: #fff;
            min-height: 100vh;
            display: flex;
            flex-grow: 1;
            flex-direction: column;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .header-gradient {
            background: linear-gradient(135deg, #001f54 0%, #003b8e 100%);
            padding: 50px 20px 40px;
            text-align: center;
            color: white;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
        }
        .search-container {
            margin-top: -35px;
            padding: 0 20px;
        }
        .search-input {
            width: 100%;
            padding: 16px 24px;
            border-radius: 20px;
            border: 1px solid #f1f5f9;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            outline: none;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        .search-input:focus {
            border-color: #001f54;
            box-shadow: 0 10px 15px -3px rgba(0, 31, 84, 0.1);
        }
        .result-item {
            background: #fff;
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 16px;
            border: 1px solid #f1f5f9;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02);
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .spinner {
            width: 28px;
            height: 28px;
            border: 3px solid #e2e8f0;
            border-top-color: #001f54;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex justify-center">

    <div class="app-card">
        <!-- شريط التنبيه -->
        <div class="bg-red-600 text-white text-[11px] py-2 text-center font-bold tracking-wide">
             ⚠️ يرجى تسديد الاشتراكات قبل تاريخ 2026/06/01
        </div>

        <!-- الهيدر -->
        <div class="header-gradient">
            <h1 class="text-2xl font-black mb-1">صندوق الحالات الطارئة</h1>
            <p class="text-blue-200 text-[11px] font-semibold tracking-[0.15em] opacity-80">قرية محبران</p>
        </div>

        <!-- البحث -->
        <div class="search-container">
            <div class="relative group">
                <input type="text" id="searchInput" class="search-input" placeholder="اكتب الاسم الكامل للبحث..." autocomplete="off">
                <button onclick="searchDonor()" class="absolute left-2 top-2 bottom-2 bg-[#001f54] text-white px-6 rounded-2xl text-[11px] font-bold active:scale-95 transition-all">
                    بـحـث
                </button>
            </div>
        </div>

        <!-- الإحصائيات -->
        <div class="grid grid-cols-3 gap-3 p-5 mt-4">
            <div class="bg-slate-50 p-4 rounded-3xl text-center border border-slate-100">
                <p class="text-[9px] text-slate-400 font-bold mb-1 uppercase">المشتركين</p>
                <p id="statTotal" class="text-xl font-black text-[#001f54]">0</p>
            </div>
            <div class="bg-emerald-50 p-4 rounded-3xl text-center border border-emerald-100">
                <p class="text-[9px] text-emerald-500 font-bold mb-1 uppercase">المسددين</p>
                <p id="statPaid" class="text-xl font-black text-emerald-600">0</p>
            </div>
            <div class="bg-rose-50 p-4 rounded-3xl text-center border border-rose-100">
                <p class="text-[9px] text-rose-400 font-bold mb-1 uppercase">الانتظار</p>
                <p id="statPending" class="text-xl font-black text-rose-600">0</p>
            </div>
        </div>

        <!-- محتوى النتائج -->
        <div class="px-5 flex-grow pb-10">
            <div id="loadingStatus" class="text-center py-10 hidden">
                <div class="spinner"></div>
                <p class="text-[10px] text-slate-400 mt-3 font-semibold">جاري مزامنة البيانات...</p>
            </div>

            <div id="resultsWrapper" class="mt-4">
                <div class="text-center py-16 opacity-20">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mx-auto mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                    <p class="text-sm font-bold">ابحث بالاسم لعرض الحالة المالية</p>
                </div>
            </div>
        </div>

        <!-- الفوتر المحدث -->
        <footer class="bg-slate-50 border-t border-slate-100 px-6 py-8">
            <div class="grid grid-cols-1 gap-6 text-center">
                <!-- المطور -->
                <div class="flex flex-col items-center">
                    <span class="text-[9px] text-slate-400 font-bold mb-1 tracking-widest uppercase">تصميم وتطوير</span>
                    <h3 class="text-sm font-bold text-[#001f54]">عمرو مسعد الشجاع</h3>
                </div>
                
                <div class="grid grid-cols-2 gap-4 pt-4 border-t border-slate-200">
                    <!-- الإشراف -->
                    <div class="flex flex-col items-center border-l border-slate-200">
                        <span class="text-[9px] text-slate-400 font-bold mb-1 uppercase">إشراف</span>
                        <h3 class="text-[11px] font-bold text-slate-700">مصطفى الشجاع</h3>
                    </div>
                    <!-- التدقيق -->
                    <div class="flex flex-col items-center">
                        <span class="text-[9px] text-slate-400 font-bold mb-1 uppercase">تدقيق مالي</span>
                        <h3 class="text-[11px] font-bold text-slate-700">ياسر الشجاع</h3>
                    </div>
                </div>
                
                <div class="pt-4">
                    <p class="text-[10px] text-slate-300 italic font-medium">صندوق محبران الخيري - لخدمة المجتمع</p>
                </div>
            </div>
        </footer>
    </div>

    <script>
        const config = {
            apiKey: "AIzaSyBupAOs6diz9ET8lGnMdyKjS_cMS8sA2Uc",
            authDomain: "amr4admin.firebaseapp.com",
            projectId: "amr4admin",
            storageBucket: "amr4admin.firebasestorage.app",
            messagingSenderId: "177280788092",
            appId: "1:177280788092:web:44f16c8f585a5b3e484bf9"
        };

        try {
            firebase.initializeApp(config);
            var db = firebase.firestore();
            var auth = firebase.auth();
        } catch(e) { console.error("Initialization error"); }

        let donors = [];

        function getInfo(d) {
            const n = d.note || "";
            const t = parseFloat((n.match(/T:(\d+(\.\d+)?)/) || [0, 0])[1]);
            const p = parseFloat((n.match(/P:(\d+(\.\d+)?)/) || [0, 0])[1]);
            const dK = (n.match(/D:([a-z0-9]+)/) || [0, 'none'])[1];
            
            let c = 'SAR';
            if (n.toUpperCase().includes('C:USD')) c = 'USD';
            else if (n.toUpperCase().includes('C:YER')) c = 'YER';

            const r = Math.max(0, t - p);
            const pr = t > 0 ? Math.min(100, (p / t) * 100) : 0;
            const isFull = t > 0 && p >= t;
            
            const labels = { '3m': '٣ أشهر', '6m': '٦ أشهر', '1y': 'سنة', 'none': 'دائم' };
            let msg = 'بانتظار السداد..';
            let cls = 'text-rose-500';
            let paid = false;

            if (isFull || dK === '1y') {
                msg = 'تم الدفع بالكامل ✓';
                cls = 'text-emerald-600';
                paid = true;
            } else if (dK === '3m') {
                msg = 'مجدول (استكمال 2026/09/01)';
                paid = true;
            } else if (dK === '6m') {
                msg = 'مجدول (استكمال 2026/12/01)';
                paid = true;
            }

            return { t, p, r, c, pr, msg, cls, paid, dur: labels[dK] };
        }

        window.searchDonor = function() {
            const term = document.getElementById("searchInput").value.trim().toLowerCase();
            const wrapper = document.getElementById("resultsWrapper");
            
            if (!term) return;

            const matches = donors.filter(d => (d.name || "").trim().toLowerCase() === term);

            if (matches.length > 0) {
                let html = '<div class="space-y-4">';
                matches.forEach(m => {
                    const i = getInfo(m);
                    html += `
                        <div class="result-item">
                            <div class="flex justify-between items-center mb-5">
                                <span class="bg-blue-50 text-[#001f54] text-[9px] px-3 py-1 rounded-full font-bold border border-blue-100">${i.dur}</span>
                                <h3 class="font-bold text-gray-800 text-sm">${m.name}</h3>
                            </div>
                            <div class="grid grid-cols-2 gap-4 mb-5">
                                <div class="text-right">
                                    <p class="text-[9px] text-slate-400 font-bold mb-1 uppercase">المدفوع (${i.c})</p>
                                    <p class="text-lg font-black text-emerald-600">${i.p.toLocaleString()}</p>
                                </div>
                                <div class="text-left">
                                    <p class="text-[9px] text-slate-400 font-bold mb-1 uppercase">المتبقي</p>
                                    <p class="text-lg font-black text-rose-500">${i.r.toLocaleString()}</p>
                                </div>
                            </div>
                            <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden mb-4">
                                <div class="h-full ${i.p >= i.t ? 'bg-emerald-500' : 'bg-[#001f54]'}" style="width:${i.pr}%"></div>
                            </div>
                            <p class="text-xs font-bold ${i.cls}">${i.msg}</p>
                        </div>`;
                });
                wrapper.innerHTML = html + '</div>';
            } else {
                wrapper.innerHTML = `<div class="text-center py-12"><p class="text-sm font-bold text-slate-400">عذراً، لم نجد اسماً مطابقاً تماماً.</p><p class="text-[10px] text-slate-300 mt-1">تأكد من كتابة الاسم كما هو في الكشوفات</p></div>`;
            }
        };

        document.getElementById('loadingStatus').classList.remove('hidden');
        
        auth.signInAnonymously().then(() => {
            db.collection('artifacts').doc('amr4admin').collection('public').doc('data').collection('donors')
            .get().then((snap) => {
                donors = [];
                snap.forEach((doc) => donors.push(doc.data()));
                
                let pCnt = 0;
                donors.forEach(d => { if(getInfo(d).paid) pCnt++; });
                
                document.getElementById('statTotal').innerText = donors.length;
                document.getElementById('statPaid').innerText = pCnt;
                document.getElementById('statPending').innerText = donors.length - pCnt;
                
                document.getElementById('loadingStatus').classList.add('hidden');
            }).catch(e => {
                document.getElementById('loadingStatus').innerHTML = '<p class="text-rose-500 text-[10px] font-bold">فشل تحديث البيانات، تحقق من الإنترنت</p>';
            });
        }).catch(e => {
            document.getElementById('loadingStatus').innerHTML = '<p class="text-rose-500 text-[10px] font-bold">خطأ في الاتصال بالخادم</p>';
        });

        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchDonor();
        });
    </script>
</body>
</html>
