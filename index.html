    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>

    <!-- Tailwind CSS -->

        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['SF Pro Text', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Cairo', 'sans-serif'],

    <style>
        body {
            background-color: #f9fafb;
            -webkit-font-smoothing: antialiased;
            letter-spacing: -0.01em;
            /* منع حركات السحب للتحديث في بعض المتصفحات للحفاظ على الثبات */
            overscroll-behavior-y: contain;
        }
        
        .fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* تحسين مظهر شريط التنبيه */
        .sticky-alert {
            position: sticky;
            top: 0;
            z-index: 100;
        }

        /* تصغير حجم الخطوط العامة */
        h1 { font-size: 1.5rem !important; }
        .stat-value { font-size: 1.25rem !important; }
        .stat-label { font-size: 0.65rem !important; letter-spacing: 0.05em; }

        /* لضمان عدم التكبير في الآيفون، يجب أن يكون حجم خط المدخلات 16px على الأقل برمجياً */
        #searchInput {
            font-size: 16px !important;
            touch-action: manipulation;
        }

        /* إخفاء شريط التمرير العرضي تماماً */
        html, body {
            max-width: 100%;
            overflow-x: hidden;
        }
    </style>

        function updateStats() {
            const total = donors.length;
            const paid = donors.filter(d => d.note.includes('✅')).length;
            document.getElementById('totalDonors').innerText = total;
            document.getElementById('paidDonors').innerText = paid;
            document.getElementById('unpaidDonors').innerText = total - paid;
        }

        function normalizeArabic(text) {
            return text.replace(/[أإآا]/g, 'ا')
                       .replace(/[ةه]/g, 'ه')
                       .replace(/[ىي]/g, 'ي')
                       .replace(/\s+/g, ' ')
                       .trim();
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') searchDonor();
        }

        function searchDonor() {
            const inputVal = document.getElementById("searchInput").value.trim();
            const container = document.getElementById("resultsContainer");
            
            if (inputVal === "") return;

            const searchKey = normalizeArabic(inputVal);
            const result = donors.find(d => normalizeArabic(d.name) === searchKey);
